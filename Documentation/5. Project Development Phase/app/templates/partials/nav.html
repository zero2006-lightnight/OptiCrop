<header class="site-nav">
    <div class="nav-inner">
        <a href="/" class="nav-logo">
            <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" stroke="currentColor" stroke-width="2"/><path d="M10 20c2-6 6-10 12-12-2 6-6 10-12 12z" fill="currentColor" opacity="0.2"/><path d="M10 20c2-6 6-10 12-12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="10" cy="20" r="2" fill="currentColor"/></svg>
            OptiCrop
        </a>
        <nav class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
            <a href="/find_your_crop" class="{% if request.path == '/find_your_crop' %}active{% endif %}">Find Your Crop</a>
            <a href="/about" class="{% if request.path == '/about' %}active{% endif %}">About</a>
            <a href="/history" class="{% if request.path == '/history' %}active{% endif %}">History</a>
        </nav>
        <a href="/find_your_crop" class="nav-cta">
            Get Started
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </a>
        <button class="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </div>
</header>
<div class="mobile-menu">
    <div class="mobile-menu-head">
        <a href="/" class="nav-logo">
            <svg viewBox="0 0 32 32" fill="none" width="28" height="28"><circle cx="16" cy="16" r="15" stroke="currentColor" stroke-width="2"/><path d="M10 20c2-6 6-10 12-12-2 6-6 10-12 12z" fill="currentColor" opacity="0.2"/><path d="M10 20c2-6 6-10 12-12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="10" cy="20" r="2" fill="currentColor"/></svg>
            OptiCrop
        </a>
        <button class="mobile-close-btn" aria-label="Close menu">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
    </div>
    <div class="mobile-menu-links">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
        <a href="/find_your_crop" class="{% if request.path == '/find_your_crop' %}active{% endif %}">Find Your Crop</a>
        <a href="/about" class="{% if request.path == '/about' %}active{% endif %}">About</a>
        <a href="/history" class="{% if request.path == '/history' %}active{% endif %}">History</a>
    </div>
    <div class="mobile-menu-footer">
        <a href="/find_your_crop" class="btn btn-primary" style="width:100%;justify-content:center;">Get Started</a>
    </div>
</div>
<script>
(function(){
    const h = document.querySelector('.hamburger');
    const m = document.querySelector('.mobile-menu');
    const c = document.querySelector('.mobile-close-btn');
    h?.addEventListener('click', () => m?.classList.add('open'));
    c?.addEventListener('click', () => m?.classList.remove('open'));
    m?.querySelectorAll('a').forEach(a => a.addEventListener('click', () => m?.classList.remove('open')));
})();
</script>
